name: Build COCLA RC1

on:
  push:
    branches: [ "rc1" ]
  pull_request:
    branches: [ "rc1" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 15
        uses: actions/setup-java@v4
        with:
          java-version: '15'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocla-jar
          path: target/*.jar
      
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@57fe99aab1055c2e71a1e2309b9691de18d6b7d6
